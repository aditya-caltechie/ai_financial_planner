name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync backend uv projects (lockfiles must resolve)
        run: |
          set -euo pipefail
          for project in database planner reporter charter retirement tagger ingest researcher; do
            echo "========== backend/${project} =========="
            uv sync --frozen --project "backend/${project}"
          done

      - name: Smoke import (database package)
        run: uv run --project backend/database python -c "from src.schemas import JobCreate; print('database package OK')"

      - name: Syntax check (byte-compile)
        run: uv run --project backend/database python -m compileall backend -q

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint
